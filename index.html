<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      No static <title>/<meta name="description">/og:title/og:description here —
      every route renders its own via src/components/SEO.jsx (React 19 hoists
      title/meta/link tags rendered anywhere in the tree into <head>). Static
      duplicates here would sit alongside the per-route ones instead of being
      replaced by them.
    -->

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon"       href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180"    href="/apple-touch-icon.png" />
    <link rel="manifest"                            href="/site.webmanifest" />
    <meta name="theme-color" content="#441CB2" />

    <!-- Open Graph fallback — og:title/og:description come from SEO.jsx per route -->
    <meta property="og:type"        content="website" />
    <meta property="og:image"       content="/android-chrome-512x512.png" />

    <!-- Analytics: Plausible (cookieless, no consent banner required) -->
    <script defer data-domain="indieconverters.uk" src="https://plausible.io/js/script.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
